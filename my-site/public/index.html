<!DOCTYPE html>
<html>
<head>
  <title>Test Vercel Node</title>
</head>
<body>

<h1>Test Vercel Node.js</h1>

<button onclick="chiamaApi()">Chiama API</button>

<pre id="output"></pre>

<script>
async function chiamaApi() {
  const res = await fetch('/api/hello')
  const data = await res.json()

  document.getElementById("output").textContent =
    JSON.stringify(data, null, 2)
}
</script>

</body>
</html>
